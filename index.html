<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4d6d">
<link rel="apple-touch-icon" href="icon.png">

<title>Welcome 🤗</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

/* Netflix intro */

#netflixIntro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.logo{
font-size:50px;
color:red;
letter-spacing:5px;
animation:netflix 3s forwards;
}

@keyframes explode {

0%{
transform:scale(0);
opacity:1;
}

100%{
transform:translateY(-200px) scale(2);
opacity:0;
}

}
  
@keyframes netflix{
0%{opacity:0; transform:scale(0.5);}
50%{opacity:1; transform:scale(1.2);}
100%{opacity:0; transform:scale(2);}
}

/* Star background */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:0.3;
}

/* Screens */

.screen{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hidden{
display:none;
}

h1{
font-size:40px;
}

button{
padding:15px 30px;
font-size:20px;
background:#ff4d6d;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

/* Photo slideshow */

#slideshow{
width:260px;
height:260px;
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

#slideshow img{
width:100%;
height:100%;
object-fit:cover;
}

/* Hearts */

.hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.heart{
position:absolute;
color:red;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

@keyframes heartbeat{

0%{transform:scale(1)}
25%{transform:scale(1.1)}
50%{transform:scale(1)}
75%{transform:scale(1.1)}
100%{transform:scale(1)}

}

#proposal h1{
animation:heartbeat 1.5s infinite;
}

/* Fireworks */

#fireworks{
font-size:60px;
animation:flash 1s infinite;
}

@keyframes flash{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

#fireworksCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.hiddenSecret{
opacity:0;
transition:opacity 2s;
margin-top:30px;
color:#ff4d6d;
}

.showSecret{
opacity:1;
}
  
</style>

</head>

<body>

<div class="stars"></div>

<audio id="music" autoplay loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<div id="netflixIntro">
<h1 class="logo">WELCOME 🤗❤️</h1>
</div>

<div class="hearts"></div>

<div id="intro" class="screen">

<h1>A Love Story</h1>
<h2>Ram ❤️ Krushitha</h2>

<button onclick="startCountdown()">Start</button>

</div>

<div id="countdown" class="screen hidden">
<h1 id="timer">3</h1>
</div>

<div id="story" class="screen hidden">

<h1>Our Love Story</h1>

<p id="message"></p>

<div id="slideshow">
<img id="slide" src="photo1.jpeg">
</div>

<br>

<button onclick="proposal()">Continue</button>

</div>

<div id="proposal" class="screen hidden">

<h1>Krushitha 💍</h1>
<h2>Will you stay with me forever?</h2>

<button onclick="celebrate()">YES ❤️</button>

</div>

<div id="celebration" class="screen hidden">

<canvas id="fireworksCanvas"></canvas>

<h1>Ram ❤️ Krushitha Forever</h1>

<h2>Our Love Story Will Never End</h2>

<h3 id="loveTimer"></h3>

<h2 id="secretMessage" class="hiddenSecret">
💍 Krushitha… one day this will not be a website.
It will be our real story forever. ❤️
</h2>

</div>
<script>

/* Netflix intro */

setTimeout(()=>{
document.getElementById("netflixIntro").style.display="none"
},3000)

/* Countdown */

function startCountdown(){

document.getElementById("intro").classList.add("hidden")
document.getElementById("countdown").classList.remove("hidden")

let count=3

let timer=setInterval(()=>{

count--

document.getElementById("timer").innerText=count

if(count==0){

clearInterval(timer)

document.getElementById("countdown").classList.add("hidden")

document.getElementById("story").classList.remove("hidden")

startTyping()

}

},1000)

}

/* Typing Love Message */

let text="Krushitha, out of billions of people in the world, my heart chose you. You are my happiness, my peace, and my forever love."

let i=0

function startTyping(){

let typing=setInterval(()=>{

document.getElementById("message").innerHTML+=text[i]

i++

if(i==text.length){
clearInterval(typing)
}

},40)

}

/* Photo slideshow */

let photos=["photo1.jpeg","photo2.jpeg","photo3.jpeg"]

let index=0

setInterval(()=>{

index++

if(index>=photos.length){
index=0
}

document.getElementById("slide").src=photos[index]

},3000)

/* Proposal */

function proposal(){

document.getElementById("story").classList.add("hidden")
document.getElementById("proposal").classList.remove("hidden")

}

/* Celebration */

function celebrate(){

document.getElementById("proposal").classList.add("hidden")
document.getElementById("celebration").classList.remove("hidden")

heartExplosion()
startLoveTimer()

}

/* Floating hearts */

function createHeart(){

const heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"%"

heart.style.fontSize=Math.random()*20+10+"px"

heart.style.animationDuration=Math.random()*3+3+"s"

document.querySelector(".hearts").appendChild(heart)

setTimeout(()=>{heart.remove()},5000)

}

setInterval(createHeart,200)

/* Service Worker */

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js")
.then(()=>console.log("Service Worker Registered"))
}

/* Heart Explosion */

function heartExplosion(){

for(let i=0;i<80;i++){

const heart=document.createElement("div")

heart.innerHTML="❤️"

heart.style.position="fixed"
heart.style.left="50%"
heart.style.top="50%"
heart.style.fontSize=Math.random()*30+20+"px"

heart.style.transition="all 2s ease-out"

document.body.appendChild(heart)

let x=(Math.random()-0.5)*600
let y=(Math.random()-0.5)*600

setTimeout(()=>{
heart.style.transform=`translate(${x}px, ${y}px)`
heart.style.opacity="0"
},10)

setTimeout(()=>{
heart.remove()
},2000)

}

}

/* Love Timer */

const loveStartDate=new Date("2025-04-07") // change to your real date

function startLoveTimer(){

setInterval(()=>{

const now=new Date()

const diff=now-loveStartDate

const days=Math.floor(diff/(1000*60*60*24))
const hours=Math.floor((diff/(1000*60*60))%24)
const minutes=Math.floor((diff/(1000*60))%60)

document.getElementById("loveTimer").innerHTML=
"Together for ❤️ <br>"+days+" Days "+hours+" Hours "+minutes+" Minutes"

},1000)

}

const canvas=document.getElementById("fireworksCanvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function createFirework(){

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height/2

for(let i=0;i<80;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*5,
vy:(Math.random()-0.5)*5,
life:100
})

}

}

function updateFireworks(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach((p,index)=>{

p.x+=p.vx
p.y+=p.vy
p.life--

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"
ctx.fillRect(p.x,p.y,3,3)

if(p.life<=0){
particles.splice(index,1)
}

})

requestAnimationFrame(updateFireworks)

}

setInterval(createFirework,800)

updateFireworks()

let tapCount=0

document.addEventListener("click",function(){

if(document.getElementById("celebration").classList.contains("hidden")) return

tapCount++

if(tapCount>=5){

document.getElementById("secretMessage").classList.add("showSecret")

}

})
  
</script>

</body>
</html>
