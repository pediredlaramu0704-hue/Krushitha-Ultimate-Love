<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ram ❤️ Krushitha</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

/* screens */

.screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hidden{
display:none;
}

/* hearts */

.hearts{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
}

.heart{
position:absolute;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

button{
padding:15px 30px;
font-size:20px;
background:#ff4d6d;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

#noBtn{
background:#555;
}

</style>
</head>

<body>

<div class="hearts"></div>

<!-- INTRO -->

<div id="intro" class="screen">

<h1>Ram ❤️ Krushitha</h1>
<h2>A Love Story</h2>

<button onclick="startCountdown()">Start</button>

</div>

<!-- COUNTDOWN -->

<div id="countdown" class="screen hidden">

<h1 id="timer">3</h1>

</div>

<!-- STORY -->

<div id="story" class="screen hidden">

<h1>Our Love Story</h1>
<p id="message"></p>

<button onclick="showProposal()">Continue</button>

</div>

<!-- PROPOSAL -->

<div id="proposal" class="screen hidden">

<h1>Krushitha 💍</h1>
<h2>Will you stay with me forever?</h2>

<button onclick="celebrate()">YES ❤️</button>
<button id="noBtn">NO 😢</button>

</div>

<!-- CELEBRATION -->

<div id="celebration" class="screen hidden">

<h1>Ram ❤️ Krushitha Forever</h1>
<h2 id="loveTimer"></h2>

</div>

<script>

/* floating hearts */

function createHeart(){

const heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"%"
heart.style.fontSize=Math.random()*20+10+"px"

document.querySelector(".hearts").appendChild(heart)

setTimeout(()=>{heart.remove()},5000)

}

setInterval(createHeart,300)

/* countdown */

function startCountdown(){

document.getElementById("intro").classList.add("hidden")
document.getElementById("countdown").classList.remove("hidden")

let count=3

const timer=setInterval(()=>{

count--

document.getElementById("timer").innerText=count

if(count==0){

clearInterval(timer)

document.getElementById("countdown").classList.add("hidden")
document.getElementById("story").classList.remove("hidden")

startTyping()

}

},1000)

}

/* typing message */

const text="Krushitha, out of billions of people in the world... my heart chose you."

let i=0

function startTyping(){

const typing=setInterval(()=>{

document.getElementById("message").innerHTML+=text[i]

i++

if(i>=text.length){
clearInterval(typing)
}

},40)

}

/* proposal */

function showProposal(){

document.getElementById("story").classList.add("hidden")
document.getElementById("proposal").classList.remove("hidden")

}

/* runaway NO button */

const noBtn=document.getElementById("noBtn")

noBtn.addEventListener("mouseover",()=>{

const x=Math.random()*(window.innerWidth-120)
const y=Math.random()*(window.innerHeight-60)

noBtn.style.position="fixed"
noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

})

/* celebration */

function celebrate(){

document.getElementById("proposal").classList.add("hidden")
document.getElementById("celebration").classList.remove("hidden")

startLoveTimer()

}

/* love timer */

const loveStartDate=new Date("2025-04-07")

function startLoveTimer(){

setInterval(()=>{

const now=new Date()

const diff=now-loveStartDate

const days=Math.floor(diff/(1000*60*60*24))

document.getElementById("loveTimer").innerText=
"Together for ❤️ "+days+" days"

},1000)

}

</script>

</body>
</html>
