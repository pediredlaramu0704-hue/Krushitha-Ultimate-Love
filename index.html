<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ram ❤️ Krushitha</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

/* Netflix intro */

#netflixIntro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.logo{
font-size:50px;
color:red;
letter-spacing:5px;
animation:netflix 3s forwards;
}

@keyframes netflix{
0%{opacity:0; transform:scale(0.5);}
50%{opacity:1; transform:scale(1.2);}
100%{opacity:0; transform:scale(2);}
}

/* Screens */

.screen{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hidden{
display:none;
}

h1{
font-size:40px;
}

button{
padding:15px 30px;
font-size:20px;
background:#ff4d6d;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

img{
width:250px;
border-radius:20px;
margin-top:20px;
}

input{
padding:10px;
font-size:18px;
border-radius:8px;
border:none;
margin-top:10px;
}

/* Hearts */

.hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.heart{
position:absolute;
color:red;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* Fireworks */

#fireworks{
font-size:60px;
animation:flash 1s infinite;
}

@keyframes flash{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

</style>

</head>

<body>

<!-- Netflix Intro -->

<div id="netflixIntro">
<h1 class="logo">RAM ❤️ KRUSHITHA</h1>
</div>

<div class="hearts"></div>

<!-- Start Screen -->

<div id="intro" class="screen">

<h1>A Love Story</h1>
<h2>Ram ❤️ Krushitha</h2>

<button onclick="startCountdown()">Start</button>

</div>

<!-- Countdown -->

<div id="countdown" class="screen hidden">

<h1 id="timer">3</h1>

</div>

<!-- Love Story -->

<div id="story" class="screen hidden">

<h1>Our Love Story</h1>

<p id="message"></p>

<img src="photo1.jpeg">

<br>

<button onclick="proposal()">Continue</button>

</div>

<!-- Proposal -->

<div id="proposal" class="screen hidden">

<h1>Krushitha 💍</h1>
<h2>Will you stay with me forever?</h2>

<button onclick="celebrate()">YES ❤️</button>

</div>

<!-- Celebration -->

<div id="celebration" class="screen hidden">

<h1 id="fireworks">🎆🎆🎆</h1>

<h1>Ram ❤️ Krushitha Forever</h1>

<h2>Our Love Story Will Never End</h2>

<p>Send a message to Ram 💌</p>

<input id="reply" placeholder="Type your message">

<br>

<button onclick="sendMessage()">Send ❤️</button>

</div>

<script>

/* Netflix intro hide */

setTimeout(()=>{
document.getElementById("netflixIntro").style.display="none"
},3000)

/* Countdown */

function startCountdown(){

document.getElementById("intro").classList.add("hidden")
document.getElementById("countdown").classList.remove("hidden")

let count=3

let timer=setInterval(()=>{

count--

document.getElementById("timer").innerText=count

if(count==0){

clearInterval(timer)

document.getElementById("countdown").classList.add("hidden")

document.getElementById("story").classList.remove("hidden")

startTyping()

}

},1000)

}

/* Typing Love Message */

let text="Krushitha, out of billions of people in the world, my heart chose you. You are my happiness, my peace, and my forever love."

let i=0

function startTyping(){

let typing=setInterval(()=>{

document.getElementById("message").innerHTML+=text[i]

i++

if(i==text.length){
clearInterval(typing)
}

},40)

}

/* Proposal */

function proposal(){

document.getElementById("story").classList.add("hidden")
document.getElementById("proposal").classList.remove("hidden")

}

/* Celebration */

function celebrate(){

document.getElementById("proposal").classList.add("hidden")
document.getElementById("celebration").classList.remove("hidden")

}

/* Send message */

function sendMessage(){

let msg=document.getElementById("reply").value

if(msg==""){
alert("Write something for Ram ❤️")
return
}

let subject="Message from Krushitha ❤️"

window.location.href="mailto:pediredlaramu0704@gmail.com?subject="+subject+"&body="+msg

}

/* Floating hearts */

function createHeart(){

const heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"%"

heart.style.fontSize=Math.random()*20+10+"px"

heart.style.animationDuration=Math.random()*3+3+"s"

document.querySelector(".hearts").appendChild(heart)

setTimeout(()=>{heart.remove()},5000)

}

setInterval(createHeart,200)

</script>

</body>
</html>
