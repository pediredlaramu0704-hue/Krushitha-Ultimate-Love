<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ram ❤️ Krushitha</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

#countdown{
font-size:60px;
margin-top:40vh;
}

.hidden{
display:none;
}

#main{
padding-top:80px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
background:#ff4d6d;
color:white;
border-radius:10px;
cursor:pointer;
}

img{
width:250px;
border-radius:20px;
margin-top:20px;
}

.hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

</style>

</head>

<body>

<div id="countdown">3</div>

<div id="main" class="hidden">

<h1>Ram ❤️ Krushitha</h1>

<h2>Our Love Story</h2>

<p id="message"></p>

<img src="photo1.jpeg">

<br><br>

<button onclick="proposal()">Click For A Surprise 💖</button>

</div>

<div id="proposal" class="hidden">

<h1>Krushitha 💍</h1>

<h2>Will you stay with me forever?</h2>

<button onclick="celebrate()">YES ❤️</button>

</div>

<div id="celebration" class="hidden">

<h1>Ram ❤️ Krushitha Forever</h1>

<h2>Our Love Story Has Just Begun ✨</h2>

</div>

<div class="hearts"></div>

<script>

let count=3
let timer=setInterval(()=>{
count--
document.getElementById("countdown").innerText=count

if(count==0){

clearInterval(timer)

document.getElementById("countdown").style.display="none"

document.getElementById("main").classList.remove("hidden")

startTyping()

}

},1000)

let text="Krushitha, out of billions of people in this world... my heart chose you. You are my happiness, my peace, and my forever love."

let i=0

function startTyping(){

let typing=setInterval(()=>{

document.getElementById("message").innerHTML+=text[i]

i++

if(i==text.length){

clearInterval(typing)

}

},40)

}

function proposal(){

document.getElementById("main").classList.add("hidden")

document.getElementById("proposal").classList.remove("hidden")

}

function celebrate(){

document.getElementById("proposal").classList.add("hidden")

document.getElementById("celebration").classList.remove("hidden")

}

function createHeart(){

const heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"%"

heart.style.animationDuration=Math.random()*3+3+"s"

document.querySelector(".hearts").appendChild(heart)

setTimeout(()=>{heart.remove()},5000)

}

setInterval(createHeart,200)

</script>

</body>
</html>
